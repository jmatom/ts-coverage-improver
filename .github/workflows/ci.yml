name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — type-check + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        # `tsc --noEmit` catches errors that ts-jest can miss (unused imports,
        # dead code paths, etc.). Cheap, runs in seconds.
        run: npx tsc --noEmit

      - name: Unit tests
        # Skip the live DockerSandbox integration test (requires the sandbox
        # image to be built locally). The integration test guards itself with
        # an availability check; running the full suite here would either
        # silently skip or fail depending on CI runner state, so we restrict
        # to unit tests for predictability.
        run: npm test -- --testPathPattern='unit'
