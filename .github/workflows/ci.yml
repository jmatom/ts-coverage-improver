name: CI

on:
  pull_request:
  push:
    branches: [main]

# Opt every JavaScript action into Node.js 24 ahead of GitHub forcing it
# on June 2nd, 2026. Avoids the "Node.js 20 actions are deprecated"
# runner warning. Affects every action in every job below — currently
# actions/checkout and actions/setup-node, both still pinned at @v4.
# Drop this when those bump to a release whose default runtime is 24.
# Source: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    name: Backend — type-check + unit + integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        # `tsc --noEmit` catches errors that ts-jest can miss (unused imports,
        # dead code paths, etc.). Cheap, runs in seconds.
        run: npx tsc --noEmit

      - name: Tests (unit + non-Docker integration)
        # Excludes only the live DockerSandbox spec, which spawns real
        # containers via dockerode and needs the sandbox image built. The
        # SQLite persistence integration tests run against an in-memory DB
        # (`node:sqlite`, no native deps) and are safe to run in CI.
        run: npm test -- --testPathIgnorePatterns='DockerSandbox'
