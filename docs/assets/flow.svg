<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" role="img" aria-label="Animated flow: GitHub source repo, then Backend, then Docker sandbox, then Claude AI, then a pull request back to GitHub" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, system-ui, sans-serif">
  <title>Coverage Improver — request flow</title>
  <desc>A packet animates left to right through five stations: GitHub source repo, Backend (NestJS), Docker sandbox, Claude AI, and a pull request opened back to GitHub.</desc>

  <!-- Background -->
  <rect width="880" height="220" fill="#fafaf9" rx="8"/>

  <!-- Connector path between station centers (used as visual rail) -->
  <line x1="150" y1="120" x2="730" y2="120" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 5"/>

  <!-- Step labels above each arrow -->
  <g font-size="11" fill="#475569" text-anchor="middle" font-weight="500">
    <text x="170" y="60">1. clone</text>
    <text x="350" y="60">2. spawn</text>
    <text x="530" y="60">3. invoke</text>
    <text x="710" y="60">4. open PR</text>
  </g>

  <!-- Tiny arrowheads at the end of each segment -->
  <g fill="#94a3b8">
    <polygon points="186,116 192,120 186,124"/>
    <polygon points="366,116 372,120 366,124"/>
    <polygon points="546,116 552,120 546,124"/>
    <polygon points="726,116 732,120 726,124"/>
  </g>

  <!-- ============== Station 1: GitHub source repo ============== -->
  <g>
    <rect x="10" y="80" width="140" height="80" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5">
      <animate attributeName="fill" values="#ffffff;#ffffff;#c7d2fe;#c7d2fe;#ffffff;#ffffff" keyTimes="0;0.005;0.04;0.085;0.13;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#94a3b8;#94a3b8;#6366f1;#6366f1;#94a3b8;#94a3b8" keyTimes="0;0.005;0.04;0.085;0.13;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <!-- Geometric icon: branch fork (source repo) -->
    <g transform="translate(80,103)" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-10" cy="-6" r="3"/>
      <circle cx="10" cy="-6" r="3"/>
      <circle cx="0" cy="10" r="3"/>
      <path d="M -10,-3 V 4 Q -10,7 -7,7 H 7 Q 10,7 10,4 V -3"/>
    </g>
    <text x="80" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Source repo</text>
    <text x="80" y="153" text-anchor="middle" font-size="11" fill="#64748b">GitHub</text>
  </g>

  <!-- ============== Station 2: Backend ============== -->
  <g>
    <rect x="190" y="80" width="140" height="80" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5">
      <animate attributeName="fill" values="#ffffff;#ffffff;#c7d2fe;#c7d2fe;#ffffff;#ffffff" keyTimes="0;0.21;0.255;0.305;0.35;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#94a3b8;#94a3b8;#6366f1;#6366f1;#94a3b8;#94a3b8" keyTimes="0;0.21;0.255;0.305;0.35;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <!-- Icon: stacked rack (server / orchestrator) -->
    <g transform="translate(260,103)" stroke="#0f172a" stroke-width="1.6" fill="none" stroke-linecap="round">
      <rect x="-12" y="-12" width="24" height="7" rx="1.5"/>
      <rect x="-12" y="-3" width="24" height="7" rx="1.5"/>
      <rect x="-12" y="6" width="24" height="7" rx="1.5"/>
      <circle cx="-7" cy="-8.5" r="0.9" fill="#0f172a" stroke="none"/>
      <circle cx="-7" cy="0.5" r="0.9" fill="#0f172a" stroke="none"/>
      <circle cx="-7" cy="9.5" r="0.9" fill="#0f172a" stroke="none"/>
    </g>
    <text x="260" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Backend</text>
    <text x="260" y="153" text-anchor="middle" font-size="11" fill="#64748b">NestJS · queue</text>
  </g>

  <!-- ============== Station 3: Docker sandbox ============== -->
  <g>
    <rect x="370" y="80" width="140" height="80" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5">
      <animate attributeName="fill" values="#ffffff;#ffffff;#c7d2fe;#c7d2fe;#ffffff;#ffffff" keyTimes="0;0.435;0.475;0.525;0.565;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#94a3b8;#94a3b8;#6366f1;#6366f1;#94a3b8;#94a3b8" keyTimes="0;0.435;0.475;0.525;0.565;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <!-- Icon: stacked containers (Docker-flavored, no licensed logo) -->
    <g transform="translate(440,103)" stroke="#0f172a" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-14" y="0" width="6" height="6" rx="0.6"/>
      <rect x="-7" y="0" width="6" height="6" rx="0.6"/>
      <rect x="0" y="0" width="6" height="6" rx="0.6"/>
      <rect x="7" y="0" width="6" height="6" rx="0.6"/>
      <rect x="-7" y="-7" width="6" height="6" rx="0.6"/>
      <rect x="0" y="-7" width="6" height="6" rx="0.6"/>
      <path d="M -16,8 Q -12,12 -8,8 Q -4,12 0,8 Q 4,12 8,8 Q 12,12 14,8" fill="none"/>
    </g>
    <text x="440" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Sandbox</text>
    <text x="440" y="153" text-anchor="middle" font-size="11" fill="#64748b">Docker container</text>
  </g>

  <!-- ============== Station 4: Claude AI ============== -->
  <g>
    <rect x="550" y="80" width="140" height="80" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5">
      <animate attributeName="fill" values="#ffffff;#ffffff;#c7d2fe;#c7d2fe;#ffffff;#ffffff" keyTimes="0;0.66;0.7;0.75;0.79;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#94a3b8;#94a3b8;#6366f1;#6366f1;#94a3b8;#94a3b8" keyTimes="0;0.66;0.7;0.75;0.79;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <!-- Icon: spark / sparkle (AI) -->
    <g transform="translate(620,103)" stroke="#0f172a" stroke-width="1.6" fill="none" stroke-linecap="round">
      <path d="M 0,-12 L 0,12 M -12,0 L 12,0 M -8,-8 L 8,8 M -8,8 L 8,-8"/>
      <circle cx="0" cy="0" r="3" fill="#0f172a" stroke="none"/>
    </g>
    <text x="620" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">AI CLI</text>
    <text x="620" y="153" text-anchor="middle" font-size="11" fill="#64748b">Claude (pluggable)</text>
  </g>

  <!-- ============== Station 5: GitHub PR ============== -->
  <g>
    <rect x="730" y="80" width="140" height="80" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5">
      <animate attributeName="fill" values="#ffffff;#ffffff;#c7d2fe;#c7d2fe;#ffffff" keyTimes="0;0.885;0.92;0.97;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#94a3b8;#94a3b8;#6366f1;#6366f1;#94a3b8" keyTimes="0;0.885;0.92;0.97;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <!-- Icon: pull-request glyph (two branches merging) -->
    <g transform="translate(800,103)" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-10" cy="-8" r="3"/>
      <circle cx="-10" cy="10" r="3"/>
      <circle cx="10" cy="10" r="3"/>
      <path d="M -10,-5 V 7"/>
      <path d="M -10,-5 Q -10,4 -2,4 H 6"/>
      <polyline points="2,0 6,4 2,8"/>
    </g>
    <text x="800" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Pull request</text>
    <text x="800" y="153" text-anchor="middle" font-size="11" fill="#64748b">GitHub</text>
  </g>

  <!-- ============== Animated packet ============== -->
  <!-- Soft glow halo behind the packet -->
  <circle r="14" fill="#6366f1" fill-opacity="0.18" cy="120">
    <animate attributeName="cx"
      values="80;80;260;260;440;440;620;620;800;800"
      keyTimes="0;0.08;0.23;0.31;0.46;0.54;0.69;0.77;0.92;1"
      dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Bright core packet -->
  <circle r="6.5" fill="#6366f1" cy="120">
    <animate attributeName="cx"
      values="80;80;260;260;440;440;620;620;800;800"
      keyTimes="0;0.08;0.23;0.31;0.46;0.54;0.69;0.77;0.92;1"
      dur="6s" repeatCount="indefinite"/>
    <animate attributeName="r"
      values="6.5;7.5;6.5;7.5;6.5;7.5;6.5;7.5;6.5;7.5;6.5"
      keyTimes="0;0.04;0.15;0.27;0.39;0.5;0.62;0.73;0.85;0.96;1"
      dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Footer caption -->
  <text x="440" y="200" text-anchor="middle" font-size="10.5" fill="#64748b" font-style="italic">
    Each cycle: clone → spawn sandbox → AI invocation → fork &amp; PR upstream
  </text>
</svg>
